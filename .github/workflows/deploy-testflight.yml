name: Deploy to TestFlight

# Triggered manually or on push to main. Uses Fastlane + match + pilot, which
# is the standard industry pattern for iOS TestFlight CD in 2026.
#
# Why Fastlane (not hand-rolled xcodebuild):
#   - Xcode 16's "automatic" signing tries Apple's cloud-managed distribution
#     certificate, which requires the ASC API key to have the Admin role.
#     We only want to grant App Manager (principle of least privilege).
#   - Fastlane match stores a CLASSIC Apple Distribution cert encrypted in a
#     separate private git repo (TytaniumDev/BlinkBreak-certificates) and
#     references it by a deterministic profile name ("match AppStore <bundle>"),
#     so xcodebuild never touches cloud signing.
#   - `upload_to_testflight` (pilot) handles the ASC API authentication cleanly.
#
# Secrets are centrally managed in Doppler (project "blinkbreak", config "prd").
# The only GitHub secret is DOPPLER_TOKEN.

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: testflight-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select latest available Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version

      - name: Install xcodegen + fastlane
        run: |
          brew install xcodegen fastlane

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Load secrets from Doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          DELIM=$(openssl rand -hex 16)
          SECRETS=$(doppler secrets download --no-file --format json)
          KEYS='[
            "MATCH_PASSWORD",
            "MATCH_SSH_PRIVATE_KEY",
            "MATCH_KEYCHAIN_PASSWORD",
            "ASC_KEY_ID",
            "ASC_ISSUER_ID",
            "ASC_API_KEY_CONTENT",
            "ASC_API_KEY_IS_BASE64",
            "SENTRY_AUTH_TOKEN"
          ]'
          # Mask every value in the log before using it.
          echo "$SECRETS" | jq -r --argjson keys "$KEYS" '
            to_entries[] | select(.key | IN($keys[])) | .value
          ' | while IFS= read -r val; do
            [ -n "$val" ] && echo "::add-mask::$val"
          done
          # Write into $GITHUB_ENV with a random heredoc delimiter so multi-line
          # values (base64 p8, RSA/ED25519 private key, etc) survive intact.
          echo "$SECRETS" | jq -r --argjson keys "$KEYS" --arg d "$DELIM" '
            to_entries[] | select(.key | IN($keys[])) | "\(.key)<<\($d)\n\(.value)\n\($d)"
          ' >> "$GITHUB_ENV"

      - name: Install SSH deploy key for match certs repo
        env:
          MATCH_SSH_PRIVATE_KEY: ${{ env.MATCH_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$MATCH_SSH_PRIVATE_KEY" > ~/.ssh/match_deploy_key
          chmod 600 ~/.ssh/match_deploy_key
          # Trust GitHub's host key so the clone doesn't prompt.
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          # Configure ssh to use our deploy key specifically for the certs repo.
          cat >> ~/.ssh/config <<'SSHCONFIG'
          Host github.com-match
            HostName github.com
            IdentityFile ~/.ssh/match_deploy_key
            IdentitiesOnly yes
          SSHCONFIG
          chmod 600 ~/.ssh/config

      - name: Run fastlane beta
        env:
          MATCH_PASSWORD: ${{ env.MATCH_PASSWORD }}
          MATCH_KEYCHAIN_PASSWORD: ${{ env.MATCH_KEYCHAIN_PASSWORD }}
          ASC_KEY_ID: ${{ env.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ env.ASC_ISSUER_ID }}
          ASC_API_KEY_CONTENT: ${{ env.ASC_API_KEY_CONTENT }}
          ASC_API_KEY_IS_BASE64: ${{ env.ASC_API_KEY_IS_BASE64 }}
          SENTRY_AUTH_TOKEN: ${{ env.SENTRY_AUTH_TOKEN }}
          # Tell fastlane it's running non-interactively.
          FASTLANE_HIDE_CHANGELOG: "1"
          FASTLANE_SKIP_UPDATE_CHECK: "1"
          FASTLANE_DISABLE_COLORS: "1"
          # Force git to use our deploy-key SSH config when talking to the
          # match certs repo. Fastlane match's Matchfile uses git@github.com:...
          # — we rewrite that via GIT_SSH_COMMAND directly.
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/match_deploy_key -o IdentitiesOnly=yes -o StrictHostKeyChecking=no"
        run: |
          fastlane beta
