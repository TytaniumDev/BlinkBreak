name: Deploy to TestFlight

# Triggered manually OR automatically on push to main once the push trigger is
# uncommented below. Auto-bumps CURRENT_PROJECT_VERSION from git commit count
# so every upload has a unique CFBundleVersion — TestFlight rejects duplicates.
#
# Secrets are centrally managed in Doppler under project "blinkbreak", config
# "prd". The only GitHub-side secret is DOPPLER_TOKEN (a read-only service
# token scoped to blinkbreak/prd). To rotate any cert or key, update it in
# Doppler and re-run this workflow — no GitHub secrets changes needed.
#
# Expected Doppler secrets (all under blinkbreak/prd):
#   APPSTORE_API_KEY_ID        - App Store Connect API Key ID
#   APPSTORE_API_ISSUER_ID     - App Store Connect Issuer ID
#   APPSTORE_API_KEY_P8        - base64(AuthKey_*.p8)
#   BUILD_CERTIFICATE_P12      - base64(Apple Distribution p12)
#   BUILD_CERTIFICATE_PASSWORD - password for the p12

on:
  workflow_dispatch:
  # Uncomment to auto-deploy every push to main:
  # push:
  #   branches: [main]

concurrency:
  group: testflight-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history for the build-number computation

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Load secrets from Doppler
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          DELIM=$(openssl rand -hex 16)
          SECRETS=$(doppler secrets download --no-file --format json)
          KEYS='[
            "APPSTORE_API_KEY_ID",
            "APPSTORE_API_ISSUER_ID",
            "APPSTORE_API_KEY_P8",
            "BUILD_CERTIFICATE_P12",
            "BUILD_CERTIFICATE_PASSWORD"
          ]'
          # Mask each value in the Actions log before anything else uses it.
          echo "$SECRETS" | jq -r --argjson keys "$KEYS" '
            to_entries[] | select(.key | IN($keys[])) | .value
          ' | while IFS= read -r val; do
            [ -n "$val" ] && echo "::add-mask::$val"
          done
          # Write into $GITHUB_ENV using a random heredoc delimiter so multi-line
          # values (base64 p12, base64 p8) survive intact.
          echo "$SECRETS" | jq -r --argjson keys "$KEYS" --arg d "$DELIM" '
            to_entries[] | select(.key | IN($keys[])) | "\(.key)<<\($d)\n\(.value)\n\($d)"
          ' >> "$GITHUB_ENV"

      - name: Compute build number from git commit count
        run: |
          BUILD_NUMBER=$(git rev-list --count HEAD)
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "Computed build number: $BUILD_NUMBER"

      - name: Patch build number into project.yml and generate Xcode project
        env:
          BUILD_NUMBER: ${{ env.BUILD_NUMBER }}
        run: |
          python3 - <<'PY'
          import os, re
          bn = os.environ["BUILD_NUMBER"]
          with open("project.yml") as f:
              content = f.read()
          content = re.sub(
              r'CURRENT_PROJECT_VERSION:\s*"?[0-9]+"?',
              f'CURRENT_PROJECT_VERSION: "{bn}"',
              content
          )
          with open("project.yml", "w") as f:
              f.write(content)
          print(f"patched CURRENT_PROJECT_VERSION to {bn}")
          PY
          xcodegen generate

      - name: Install signing certificate into temp keychain
        env:
          BUILD_CERTIFICATE_P12: ${{ env.BUILD_CERTIFICATE_P12 }}
          BUILD_CERTIFICATE_PASSWORD: ${{ env.BUILD_CERTIFICATE_PASSWORD }}
        run: |
          echo "$BUILD_CERTIFICATE_P12" | base64 --decode > /tmp/cert.p12
          KEYCHAIN=/tmp/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          EXISTING=$(security list-keychains -d user | tr -d '"' | xargs)
          security list-keychains -d user -s "$KEYCHAIN" $EXISTING

          security import /tmp/cert.p12 \
            -k "$KEYCHAIN" \
            -P "$BUILD_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          rm /tmp/cert.p12
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Write App Store Connect API key
        env:
          APPSTORE_API_KEY_P8: ${{ env.APPSTORE_API_KEY_P8 }}
          APPSTORE_API_KEY_ID: ${{ env.APPSTORE_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_API_KEY_P8" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8

      - name: Archive app
        env:
          APPSTORE_API_KEY_ID: ${{ env.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ env.APPSTORE_API_ISSUER_ID }}
        run: |
          xcodebuild archive \
            -project BlinkBreak.xcodeproj \
            -scheme BlinkBreak \
            -archivePath build/BlinkBreak.xcarchive \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -allowProvisioningUpdates \
            -authenticationKeyID "$APPSTORE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPSTORE_API_ISSUER_ID" \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8

      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>destination</key><string>export</string>
            <key>teamID</key><string>F2HXQGU2CC</string>
            <key>signingStyle</key><string>automatic</string>
            <key>stripSwiftSymbols</key><true/>
            <key>uploadSymbols</key><true/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/BlinkBreak.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath build/export \
            -allowProvisioningUpdates

      - name: Upload to TestFlight
        env:
          APPSTORE_API_KEY_ID: ${{ env.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ env.APPSTORE_API_ISSUER_ID }}
        run: |
          IPA_PATH=$(find build/export -name "*.ipa" | head -1)
          echo "Uploading: $IPA_PATH"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_API_ISSUER_ID"
