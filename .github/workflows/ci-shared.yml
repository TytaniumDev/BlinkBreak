name: CI Shared

on:
  workflow_call:

jobs:
  Lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: ./scripts/lint.sh

  Build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select latest available Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Build
        run: ./scripts/build.sh

  Test:
    runs-on: macos-15
    env:
      BLINKBREAK_FULL_TESTS: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Select latest available Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $XCODE"
          sudo xcode-select -s "$XCODE"
          xcodebuild -version
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Test
        run: ./scripts/test.sh
