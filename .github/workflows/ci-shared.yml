name: CI Shared

on:
  workflow_call:

jobs:
  Lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Lint
        run: ./scripts/lint.sh

  Build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode.app
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Build
        run: ./scripts/build.sh

  Test:
    runs-on: macos-15
    env:
      BLINKBREAK_FULL_TESTS: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app || sudo xcode-select -s /Applications/Xcode.app
      - name: Install xcodegen
        run: brew install xcodegen
      - name: Test
        run: ./scripts/test.sh
