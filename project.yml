# BlinkBreak Xcode project spec for xcodegen.
#
# Generate the .xcodeproj with:
#   xcodegen generate
#
# This file is the source of truth for the Xcode project structure — the
# generated BlinkBreak.xcodeproj is gitignored. Diff against this file to see
# what changed in the project configuration.

name: BlinkBreak
options:
  bundleIdPrefix: com.tytaniumdev
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "F2HXQGU2CC"
    CODE_SIGN_STYLE: Automatic

# Local package dependency — all business logic lives here.
packages:
  BlinkBreakCore:
    path: Packages/BlinkBreakCore

targets:

  # =========================================================================
  # iOS app target
  # =========================================================================
  BlinkBreak:
    type: application
    platform: iOS
    sources:
      - path: BlinkBreak
    dependencies:
      - package: BlinkBreakCore
      # Embed the watchOS companion app inside the iOS app so archives bundle
      # both for TestFlight upload. xcodegen infers the correct embed destination
      # (Watch) because the target's platform is watchOS.
      - target: "BlinkBreak Watch App"
    configFiles:
      Debug: BlinkBreak/BugReport/BugReport.xcconfig
      Release: BlinkBreak/BugReport/BugReport.xcconfig
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: BlinkBreak/Info.plist
      properties:
        CFBundleDisplayName: BlinkBreak
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Export compliance: BlinkBreak does not implement or call any encryption
        # directly (no network, no keychain, no custom crypto), so it's exempt from
        # U.S. export compliance. Setting this flag skips App Store Connect's
        # encryption documentation dialog on every upload.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UIBackgroundModes:
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.tytaniumdev.BlinkBreak.scheduleCheck
        UIRequiredDeviceCapabilities:
          - arm64
        # Portrait-only; UIRequiresFullScreen silences Xcode's "all orientations must
        # be supported" validation warning for single-orientation apps.
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Bug report PAT, injected via BugReport.xcconfig (gitignored).
        # Falls back gracefully if the xcconfig is missing.
        BugReportGitHubToken: $(BUG_REPORT_GITHUB_TOKEN)
    entitlements:
      path: BlinkBreak/BlinkBreak.entitlements
      properties:
        com.apple.developer.usernotifications.time-sensitive: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tytaniumdev.BlinkBreak
        TARGETED_DEVICE_FAMILY: "1,2"  # iPhone + iPad
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: NO
    scheme:
      testTargets:
        - BlinkBreakTests
      gatherCoverageData: true

  # =========================================================================
  # watchOS app target
  # =========================================================================
  BlinkBreak Watch App:
    type: application
    platform: watchOS
    sources:
      - path: "BlinkBreak Watch App"
    dependencies:
      - package: BlinkBreakCore
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: "BlinkBreak Watch App/Info.plist"
      properties:
        CFBundleDisplayName: BlinkBreak
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # Same export-compliance exemption as the iOS target.
        ITSAppUsesNonExemptEncryption: false
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.tytaniumdev.BlinkBreak
        WKWatchOnly: false
    entitlements:
      path: "BlinkBreak Watch App/BlinkBreakWatch.entitlements"
      properties:
        com.apple.developer.usernotifications.time-sensitive: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tytaniumdev.BlinkBreak.watchkitapp
        TARGETED_DEVICE_FAMILY: "4"  # watchOS
        ENABLE_PREVIEWS: YES

  # =========================================================================
  # Unit test target (runs BlinkBreakCore tests via the iOS scheme; the
  # package-level `swift test` run covers these too, this is for Xcode / CI
  # running xcodebuild test).
  # =========================================================================
  BlinkBreakTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BlinkBreakTests
    dependencies:
      - target: BlinkBreak
      - package: BlinkBreakCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tytaniumdev.BlinkBreakTests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/BlinkBreak.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/BlinkBreak"
        GENERATE_INFOPLIST_FILE: YES

  # =========================================================================
  # UI test target — XCUITest integration suite.
  #
  # IMPORTANT: This suite is slow (several minutes). Only run it as a final
  # verification step, NOT during iteration. Use ./scripts/test.sh for the
  # fast unit-test loop during development.
  # =========================================================================
  BlinkBreakUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: BlinkBreakUITests
    dependencies:
      - target: BlinkBreak
      - package: BlinkBreakCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tytaniumdev.BlinkBreakUITests
        TEST_TARGET_NAME: BlinkBreak
        GENERATE_INFOPLIST_FILE: YES

schemes:
  BlinkBreak:
    build:
      targets:
        BlinkBreak: all
        BlinkBreak Watch App: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BlinkBreakTests
      gatherCoverageData: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  # Separate scheme for the slow XCUITest integration suite. Kept out of the
  # main BlinkBreak scheme so `./scripts/test.sh` (and the fast CI unit job)
  # never accidentally runs the integration suite.
  #
  # Run via ./scripts/test-integration.sh as a final verification step.
  BlinkBreakUITests:
    build:
      targets:
        BlinkBreak: all
        BlinkBreak Watch App: all
        BlinkBreakUITests: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - BlinkBreakUITests
      gatherCoverageData: false
      environmentVariables:
        BB_BREAK_INTERVAL: "3"
        BB_LOOKAWAY_DURATION: "3"
